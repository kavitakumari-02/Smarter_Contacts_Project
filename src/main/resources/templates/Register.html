<!doctype html>

<html lang="en"
xmlns:th="http://www.thymeleaf.org"
th:replace="base :: layout(~{::section})">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/CSS/registerStyle.css}" rel="stylesheet">

</head>

<body style="background:#f5f5f5;">

<section>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow register-card p-4">

<div class="text-center mb-3">

</div>

<!-- Session Message -->

<div th:if="${printingMessage}"
     th:class="'alert alert-' + ${printingMessage.type}"
     role="alert">

<p class="text-center mb-0"
   th:text="${printingMessage.msgContent}">
</p>


</div>

<h2 class="text-center register-title mb-4">
Register Here !!
</h2>

<form th:action="@{/register_handler}" th:object="${user}" method="post">

<!-- Name -->

<div class="mb-3">
<label class="form-label">Name</label>

<input type="text"
    th:field="*{name}"
    class="form-control"
    placeholder="Enter your name">

<p class="text-danger"
   th:if="${#fields.hasErrors('name')}"
   th:errors="*{name}">
</p>

</div>

<!-- Email -->

<div class="mb-3">

<label class="form-label">Email Address</label>

<input type="email"
    th:field="*{email}"
    class="form-control"
    placeholder="Enter your email">

<p class="text-danger"
   th:if="${#fields.hasErrors('email')}"
   th:errors="*{email}">
</p>

</div>

<!-- Password -->

<div class="mb-3">

<label class="form-label">Password</label>

<input type="password"
    th:field="*{password}"
    class="form-control"
    placeholder="Enter password">

<p class="text-danger"
   th:if="${#fields.hasErrors('password')}"
   th:errors="*{password}">
</p>

</div>

<!-- About -->

<div class="mb-3">

<label class="form-label">About You</label>

<textarea class="form-control"
          th:field="*{about}"
          rows="5"
          placeholder="Write something about yourself">
</textarea>

<p class="text-danger"
   th:if="${#fields.hasErrors('about')}"
   th:errors="*{about}">
</p>

</div>

<!-- Terms and Conditions -->

<div class="mb-3 form-check">

<input type="checkbox"
    name="agree"
    class="form-check-input"
    id="agree" required>

<label class="form-check-label" for="agree">
Accept Terms and Conditions
</label>

<p class="text-danger"
   th:if="${#fields.hasErrors('agree')}"
   th:errors="*{agree}">
</p>
</div>

<!-- Submit Button -->

<div class="text-center">

<button type="submit"
     class="btn btn-primary w-50">

Register

</button>

<a th:href="@{/home}" class="btn btn-secondary">Back</a>
<div>
	<p class="text-center mt-3">
	    Already have an account? 
	    <a th:href="@{/login}" class="fw-bold">Login here</a>
	</p>

   </div>
   </div>
</form>

</div>
</div>
</div>
</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
