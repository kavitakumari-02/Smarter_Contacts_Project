<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
th:replace="Dashboard/base :: layout(~{::section})">

<head>
<title>Contact Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<section>
	<div style="margin-left:200px; width:100%; background-color:#f5f5f5; min-height:100vh; padding:30px;">

			<div class="container">

			<div class="card shadow p-4" style="background-color:white; border-radius:10px;">
				<div th:if="${session.message}" 
				     th:class="'alert alert-' + ${session.message.type}"
				     role="alert">

				<h5 class="text-center" 
				    th:text="${session.message.msgContent}">
				</h5>
				</div>
			
	
<div class="container mt-5" th:if="${contact}">
	<div class="text-center mb-4">
	<img th:src="@{'/images/'+${contact.image}}"
	class="img-fluid rounded-circle"
	style="height:150px;width:150px;
	object-fit:cover;" 
	alt="profileImage">
	</div>
<h2 class="text-center mb-4" th:text="${contact.firstName +' '+contact.lastName}"></h2>

<table class="table table-bordered">

<tr>
<th>ID</th>
<td th:text="${contact.id}"></td>
</tr>


<tr>
<th>Email</th>
<td th:text="${contact.email}"></td>
</tr>

<tr>
<th>Phone</th>
<td th:text="${contact.phone}"></td>
</tr>

<tr>
<th>Profession</th>
<td th:text="${contact.profession}"></td>
</tr>

<tr>
<th>Description</th>
<td th:text="${contact.description}"></td>
</tr>

</table>

<button class="btn btn-primary" onclick="history.back()">Back</button>
</div>
<div th:unless="${contact}" class="d-flex justify-content-center mt-5">

    <div class="card shadow text-center p-4" style="max-width:400px; border-radius:10px;">

        <h1 class="text-danger">⚠️</h1>

        <h4 class="text-danger mt-2">
            Access Denied
        </h4>

        <p class="text-muted">
            Contact not found or you are not authorized to view it.
        </p>

        <a href="/user/show_contact/0" class="btn btn-primary mt-3">
            Go Back
        </a>

    </div>

</div>

</section>
</body>
</html>
