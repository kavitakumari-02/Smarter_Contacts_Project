<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="Dashboard/base :: layout(~{::section})">

<section>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.tiny.cloud/1/894jvlnbda7hwg4rkskgknht3nok2i2nb323wwj2hc15uqge/tinymce/8/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>

<div style="background-color:#f5f5f5; min-height:60vh; padding:30px;">

    <!-- Add proper margin for sidebar -->
    <div class="container-fluid">
		<div class="container mt-4">
			<div class="col-12 col-md-6 mb-3">
        <div class="card shadow p-4" 
             style="background-color:white; border-radius:10px; max-width:900px; margin:auto;">

            

                <h2 class="text-center mb-4">Add Contact</h2>

<div th:if="${printingMsg}" 
     th:class="'alert alert-' + ${printingMsg.type}"
     role="alert">

<h5 class="text-center" 
    th:text="${printingMsg.msgContent}">
</h5>

</div>

<form th:action="@{/user/process-contact}" method="post"
enctype="multipart/form-data" th:object="${contact}">

<!-- Name -->
<div class="mb-2">

<div class="input-group">
<span class="input-group-text"><i class="fa fa-plus"></i></span>

<input type="text"
th:field="*{firstName}" 
class="form-control" 
placeholder="Enter Name here">

</div>

<p class="text-danger"
th:if="${#fields.hasErrors('firstName')}"
th:errors="*{firstName}">
</p>

</div>

<!-- Last Name -->
<div class="mb-3">

<div class="input-group">
<span class="input-group-text"><i class="fa fa-user"></i></span>

<input type="text"
th:field="*{lastName}"
class="form-control"
placeholder="Enter Last Name here">

</div>
<p class="text-danger" 
th:if="${#fields.hasErrors('lastName')}"
th:errors="*{lastName}"></p>
</div>

<!-- Phone -->
<div class="mb-3">

<div class="input-group">
<span class="input-group-text"><i class="fa fa-phone"></i></span>

<input type="text"
th:field="*{phone}"
class="form-control"
placeholder="Enter Phone Number here">

</div>
<p class="text-danger" 
th:if="${#fields.hasErrors('phone')}"
th:errors="*{phone}"></p>


</div>

<!-- Email -->
<div class="mb-3">

<div class="input-group">
<span class="input-group-text"><i class="fa fa-envelope"></i></span>

<input type="email"
th:field="*{email}"
class="form-control"
placeholder="Enter email here">

</div>
<p class="text-danger" 
th:if="${#fields.hasErrors('email')}"
th:errors="*{email}"></p>


</div>

<!-- Profession -->
<div class="mb-3">

<div class="input-group">
<span class="input-group-text"><i class="fa fa-briefcase"></i></span>

<input type="text"
th:field="*{profession}"
class="form-control"
placeholder="Enter profession here">

</div>
<p class="text-danger" 
th:if="${#fields.hasErrors('profession')}"
th:errors="*{profession}"></p>


</div>

<<!-- Description -->
<div class="mb-3">

<textarea class="form-control"
rows="6"
placeholder="Enter contact description"
th:field="*{description}">
</textarea>

<p class="text-danger" 
th:if="${#fields.hasErrors('description')}"
th:errors="*{description}">
</p>

</div>


<!-- Image Upload -->
<div class="mb-3">
<input type="file"

class="form-control"
name="profileImage">
</div>


<!-- Button -->
<div class="text-center">

<button type="submit" class="btn btn-primary">
Save Contact
</button>
<button class="btn btn-primary" onclick="history.back()">Back</button>
</div>

</form>

</div>

<script th:src="@{/js/dashboard.js}"></script>
<script>
  tinymce.init({
    selector: 'textarea',
	 });
	</script>

</section>

</html>
