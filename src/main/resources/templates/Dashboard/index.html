<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
th:replace="Dashboard/base :: layout(~{::section})">
<title>Dashboard</title>

   <!-- Bootstrap CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- Font Awesome -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<section>
       <style>
           body {
               background: #f8f9fa;
           }

           .dashboard {
               height: 50vh;
           }

           .card {
               border-radius: 20px;
               transition: 0.3s;
               background: #ffffff;
           }

           .card:hover {
               transform: translateY(-8px);
           }

           .icon {
               font-size: 40px;
               margin-bottom: 10px;
           }

           .add {
               color: #0d6efd;
           }

           .view {
               color: #20c997;
           }

           h2 {
               color: #555;
           }
       </style>
   </head>
   <body>

   <div class="container d-flex flex-column justify-content-center align-items-center dashboard">

       <h2 class="mb-5">Welcome to Dashboard</h2>

       <div class="row text-center w-75">

           <!-- Add Contact -->
           <div class="col-md-6 mb-4">
               <div class="card shadow p-5">
                   <i class="fa-solid fa-user-plus icon add"></i>
                   <h4>Add Contact</h4>
                   <p>Create a new contact easily</p>
                   <a href="/user/add_contact" class="btn btn-primary">Add</a>
               </div>
           </div>

           <!-- Show Contacts -->
           <div class="col-md-6 mb-4">
               <div class="card shadow p-5">
                   <i class="fa-solid fa-address-book icon view"></i>
                   <h4>Show Contacts</h4>
                   <p>View all saved contacts</p>
                   <a href="/user/show_contact/0" class="btn btn-success">Show</a>
               </div>
           </div>

       </div>

   </div>


</section>

</html>
