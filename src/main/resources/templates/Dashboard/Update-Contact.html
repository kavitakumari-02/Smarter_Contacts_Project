<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="Dashboard/base :: layout(~{::section})">
	<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Update contact</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


	</head>
	<section>

	<div class="d-flex">

	    <!-- Main Content (adjust according to sidebar width) -->
	    <div style="margin-left:250px; width:100%; background:#f5f5f5; min-height:100vh; padding:30px;">

	        <div class="container">

	            <!-- Card -->
	            <div class="card shadow p-4"
	                 style="max-width:850px; margin:auto; border-radius:10px;">

	                <h2 class="text-center mb-4">Update Contact</h2>

	<div th:if="${session.printingMsg}" 
	     th:class="'alert alert-' + ${session.printingMsg.type}"
	     role="alert">

	<h5 class="text-center" 
	    th:text="${session.printingMsg.msgContent}">
	</h5>

	</div>

	<form th:action="@{/user/update-contactdata}" method="post"
	enctype="multipart/form-data" th:object="${contact}">
	<div>
		<input type="hidden"
			th:field="*{id}" 
			class="form-control" >
	</div>
	<!-- Name -->
	<div class="mb-2">

	<div class="input-group">
	<span class="input-group-text"><i class="fa fa-plus"></i></span>

	<input type="text"
	th:field="*{firstName}" 
	class="form-control" 
	placeholder="Enter Name here">

	</div>

	<p class="text-danger"
	th:if="${#fields.hasErrors('firstName')}"
	th:errors="*{firstName}">
	</p>

	</div>

	<!-- Last Name -->
	<div class="mb-3">

	<div class="input-group">
	<span class="input-group-text"><i class="fa fa-user"></i></span>

	<input type="text"
	th:field="*{lastName}"
	class="form-control"
	placeholder="Enter Last Name here">

	</div>
	<p class="text-danger" 
	th:if="${#fields.hasErrors('lastName')}"
	th:errors="*{lastName}"></p>
	</div>

	<!-- Phone -->
	<div class="mb-3">

	<div class="input-group">
	<span class="input-group-text"><i class="fa fa-phone"></i></span>

	<input type="text"
	th:field="*{phone}"
	class="form-control"
	placeholder="Enter Phone Number here">

	</div>
	<p class="text-danger" 
	th:if="${#fields.hasErrors('phone')}"
	th:errors="*{phone}"></p>


	</div>

	<!-- Email -->
	<div class="mb-3">

	<div class="input-group">
	<span class="input-group-text"><i class="fa fa-envelope"></i></span>

	<input type="email"
	th:field="*{email}"
	class="form-control"
	placeholder="Enter email here">

	</div>
	<p class="text-danger" 
	th:if="${#fields.hasErrors('email')}"
	th:errors="*{email}"></p>


	</div>

	<!-- Profession -->
	<div class="mb-3">

	<div class="input-group">
	<span class="input-group-text"><i class="fa fa-briefcase"></i></span>

	<input type="text"
	th:field="*{profession}"
	class="form-control"
	placeholder="Enter profession here">

	</div>
	<p class="text-danger" 
	th:if="${#fields.hasErrors('profession')}"
	th:errors="*{profession}"></p>


	</div>

	<<!-- Description -->
	<div class="mb-3">

	<textarea class="form-control"
	rows="6"
	placeholder="Enter contact description"
	th:field="*{description}">
	</textarea>

	<p class="text-danger" 
	th:if="${#fields.hasErrors('description')}"
	th:errors="*{description}">
	</p>

	</div>


	<!-- Image Upload -->
	<img style="width: 200px; height: 200px;" class="my_picture" th:src="@{'/images/'+${contact.image}}" alt="profileImage"> 
	<div class="mb-3">
	<input type="file"

	class="form-control"
	name="profileImage">
	</div>


	<!-- Button -->
	<div class="text-center">

	<button type="submit" class="btn btn-primary">
	Update Contact
	</button>
	<button class="btn btn-primary" onclick="history.back()">Back</button>
	</div>

	</form>

	</div>

	<script th:src="@{/js/dashboard.js}"></script>
	<script>
	  tinymce.init({
	    selector: 'textarea',
		 });
		</script>

	</section>

</body>
</html>
